name: kumauptime

# Single Uptime Kuma instance behind Caddy.
# - Kuma is NOT published to the host; only Caddy reaches it over the private network.
# - Caddy terminates TLS for every status-page domain + the admin domain (auto Let's Encrypt).
# Configure .env (copy from .env.example) before `docker compose up -d`. See README.md.

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1        # tracks the 1.x line. Pin a digest in prod (see README).
    container_name: kuma
    restart: unless-stopped
    networks: [edge]
    expose:
      - "3001"                            # internal only — reached by Caddy as uptime-kuma:3001
    volumes:
      - kuma-data:/app/data               # SQLite DB: monitors, status pages, history, settings
    healthcheck:
      test: ["CMD", "extra/healthcheck"]  # ships inside the image
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - uptime-kuma
    networks: [edge]
    # No env_file: Compose interpolates env values and would mangle the bcrypt
    # hash's '$' chars. All config is baked into the rendered Caddyfile instead
    # (scripts/render-caddyfile.sh).
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"                     # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro   # GENERATED by render-caddyfile.sh
      - caddy-data:/data                  # ACME certs + keys — back this up (scripts/backup.sh)
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge:
    driver: bridge

volumes:
  kuma-data:
  caddy-data:
  caddy-config:
